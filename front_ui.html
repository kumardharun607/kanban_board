<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kanban Board Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
    overflow-x:hidden;
    overflow-y:auto;
}

.glass{
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
}

.floating{
    animation:floating 4s ease-in-out infinite;
}

@keyframes floating{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.slide-left{
    animation:slideLeft 1s ease;
}

.slide-right{
    animation:slideRight 1s ease;
}

@keyframes slideLeft{
    from{
        opacity:0;
        transform:translateX(-100px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes slideRight{
    from{
        opacity:0;
        transform:translateX(100px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

.btn-hover{
    transition:.3s;
}

.btn-hover:hover{
    transform:translateY(-3px) scale(1.02);
}

@media(max-width:768px){

    .floating{
        animation:none;
    }

}

    </style>

</head>

<body class="bg-gradient-to-br from-gray-900 via-blue-900 to-indigo-900 min-h-screen flex items-center justify-center">

    <!-- Background Glow -->

    <div
    class="absolute w-48 h-48 sm:w-72 sm:h-72 lg:w-96 lg:h-96 bg-blue-500 rounded-full blur-3xl opacity-20 top-0 left-0">
</div>

<div
    class="absolute w-48 h-48 sm:w-72 sm:h-72 lg:w-96 lg:h-96 bg-purple-500 rounded-full blur-3xl opacity-20 bottom-0 right-0">
</div>


 <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10 py-10">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10">

        <!-- USER CARD -->

        <div
            class="glass rounded-3xl p-6 sm:p-8 lg:p-10 text-center text-white shadow-2xl slide-left floating">

            <div class="mb-4 sm:mb-6">

                <i class="bi bi-person-circle text-5xl sm:text-6xl lg:text-7xl text-cyan-400"></i>

            </div>

            <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4">
                User Portal
            </h1>

            <p class="text-sm sm:text-base text-gray-300 mb-8">
                Access projects, manage tasks and collaborate with your team.
            </p>

            <div class="space-y-4">

                <a href="userRegister.html"
                    class="block bg-purple-500 hover:bg-purple-600 text-white py-3 rounded-xl font-semibold btn-hover">

                    <i class="bi bi-person-plus-fill mr-2"></i>
                    Click Here For User Register

                </a>

                <a href="userlogin.html"
                    class="block bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-semibold btn-hover">

                    <i class="bi bi-box-arrow-in-right mr-2"></i>
                    Click Here For User Login

                </a>

            </div>

        </div>

        <!-- ADMIN CARD -->

        <div
            class="glass rounded-3xl p-6 sm:p-8 lg:p-10 text-center text-white shadow-2xl slide-right floating">

            <div class="mb-4 sm:mb-6">

                <i class="bi bi-shield-lock-fill text-5xl sm:text-6xl lg:text-7xl text-purple-400"></i>

            </div>

            <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-4">
                Admin Portal
            </h1>

            <p class="text-sm sm:text-base text-gray-300 mb-8">
                Manage users, projects, permissions and monitor activities.
            </p>

            <div class="space-y-4">

                <a href="adminRegister.html"
                    class="block bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-semibold btn-hover">

                    <i class="bi bi-person-workspace mr-2"></i>
                    Click Here For Admin Register

                </a>

                <a href="adminLogin.html"
                    class="block bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold btn-hover">

                    <i class="bi bi-shield-check mr-2"></i>
                    Click Here For Admin Login

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
