<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>User Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        html,
        body {
            overflow-x: hidden;
        }

        body {
            background:
                radial-gradient(circle at top left,
                    rgba(139, 92, 246, 0.4),
                    transparent 35%),
                radial-gradient(circle at bottom right,
                    rgba(236, 72, 153, 0.35),
                    transparent 35%),
                #050816;
        }

        .task-card {
            transition: all .3s ease;
        }

        .task-card:hover {
            transform: translateY(-4px);
        }

        .fade-up {
            animation: fadeUp .8s ease;
        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }
    </style>

</head>

<body class="min-h-screen text-white">

    <!-- Navbar -->

    <nav
        class="bg-black/20 backdrop-blur-lg border-b border-purple-500/20 sticky top-0 z-50">

        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

            <div
                class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

                <h1
                    class="text-xl sm:text-2xl font-bold text-center md:text-left">

                    Welcome,

                    <span
                        id="userName"
                        class="text-pink-400">

                        Loading...

                    </span>

                </h1>

                <div
                    class="flex flex-wrap justify-center md:justify-end gap-3">

                    <a href="./front_ui.html">

                        <button
                            id="Homebtn"
                            class="px-5 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-105 transition">

                            Home

                        </button>

                    </a>

                    <button
                        id="logoutBtn"
                        class="px-5 py-2 rounded-lg bg-gradient-to-r from-red-500 to-pink-500 hover:scale-105 transition">

                        Logout

                    </button>

                </div>

            </div>

        </div>

    </nav>

    <!-- Main Container -->

    <div
        class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 fade-up">

        <!-- Message -->

        <div
            id="messageBox"
            class="hidden bg-red-500 p-3 rounded-xl mb-5">
        </div>

        <!-- Responsive Grid -->

        <div
            class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">

            <!-- TO DO -->

            <div
                class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-4">

                <h2
                    class="text-xl font-bold mb-4 text-purple-300">

                    To Do

                </h2>

                <div
                    id="todoContainer"
                    class="space-y-3">
                </div>

            </div>

            <!-- DOING -->

            <div
                class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-4">

                <h2
                    class="text-xl font-bold mb-4 text-yellow-300">

                    Doing

                </h2>

                <div
                    id="doingContainer"
                    class="space-y-3">
                </div>

            </div>

            <!-- DONE -->

            <div
                class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-4">

                <h2
                    class="text-xl font-bold mb-4 text-green-300">

                    Done

                </h2>

                <div
                    id="doneContainer"
                    class="space-y-3">
                </div>

            </div>

            <!-- Create Task -->

            <div
                class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-5">

                <h2
                    class="text-xl font-bold mb-5">

                    Create New Task

                </h2>

                <input
                    id="project_code"
                    type="text"
                    placeholder="Project Code"
                    class="w-full mb-4 p-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-purple-500">

                <textarea
                    id="task_name"
                    rows="5"
                    placeholder="Task Description"
                    class="w-full mb-4 p-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-purple-500 resize-none"></textarea>

                <button
                    id="assignTaskBtn"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-600 to-pink-500 hover:scale-[1.02] transition">

                    Assign Task

                </button>

            </div>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="userdashboard.js"></script>

</body>

</html>
